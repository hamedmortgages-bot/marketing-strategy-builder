<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hamed Ashouri Marketing monogram">
  <!-- Concept A: warm charcoal tile, champagne-gold hairline, two-tone HA monogram -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="#1C1A17"/>
  <rect x="22" y="22" width="468" height="468" rx="86" fill="none" stroke="#C2A36B" stroke-width="4" opacity="0.9"/>
  <g fill="none" stroke-width="26" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- H (ivory) -->
    <g stroke="#EFE9DC">
      <line x1="150" y1="158" x2="150" y2="360"/>
      <line x1="222" y1="158" x2="222" y2="360"/>
      <line x1="150" y1="262" x2="222" y2="262"/>
    </g>
    <!-- A (champagne gold): real peak + crossbar -->
    <g stroke="#C2A36B">
      <polyline points="262,360 312,158 362,360"/>
      <line x1="282" y1="300" x2="342" y2="300"/>
    </g>
  </g>
</svg>
