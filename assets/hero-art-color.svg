<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clarity — colorful motif">
  <defs>
    <radialGradient id="cA" cx="28%" cy="30%" r="55%"><stop offset="0%" stop-color="#2FB3B8" stop-opacity="0.85"/><stop offset="100%" stop-color="#2FB3B8" stop-opacity="0"/></radialGradient>
    <radialGradient id="cB" cx="78%" cy="34%" r="55%"><stop offset="0%" stop-color="#7A4FD0" stop-opacity="0.8"/><stop offset="100%" stop-color="#7A4FD0" stop-opacity="0"/></radialGradient>
    <radialGradient id="cC" cx="66%" cy="82%" r="60%"><stop offset="0%" stop-color="#E0894E" stop-opacity="0.85"/><stop offset="100%" stop-color="#E0894E" stop-opacity="0"/></radialGradient>
    <radialGradient id="cD" cx="24%" cy="80%" r="55%"><stop offset="0%" stop-color="#D24C86" stop-opacity="0.7"/><stop offset="100%" stop-color="#D24C86" stop-opacity="0"/></radialGradient>
    <radialGradient id="core" cx="50%" cy="46%" r="52%"><stop offset="0%" stop-color="#FBE7C6" stop-opacity="0.95"/><stop offset="45%" stop-color="#E7C888" stop-opacity="0.25"/><stop offset="100%" stop-color="#E7C888" stop-opacity="0"/></radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF3D6" stop-opacity="0"/><stop offset="50%" stop-color="#FFF3D6" stop-opacity="0.8"/><stop offset="100%" stop-color="#FFF3D6" stop-opacity="0"/></linearGradient>
  </defs>

  <!-- deep base + aurora colour field -->
  <rect width="560" height="480" rx="14" fill="#141319"/>
  <rect width="560" height="480" rx="14" fill="url(#cA)"/>
  <rect width="560" height="480" rx="14" fill="url(#cB)"/>
  <rect width="560" height="480" rx="14" fill="url(#cC)"/>
  <rect width="560" height="480" rx="14" fill="url(#cD)"/>
  <!-- subtle darkening vignette for depth -->
  <rect width="560" height="480" rx="14" fill="#0E0D12" opacity="0.30"/>
  <!-- central golden glow -->
  <rect width="560" height="480" rx="14" fill="url(#core)"/>

  <g transform="translate(280,224)">
    <!-- concentric rings -->
    <circle r="44"  fill="none" stroke="#FDF4DF" stroke-width="1.2" opacity="0.9"/>
    <circle r="84"  fill="none" stroke="#FDF4DF" stroke-width="1" opacity="0.5"/>
    <circle r="126" fill="none" stroke="#FDF4DF" stroke-width="1" opacity="0.28"/>
    <circle r="170" fill="none" stroke="#FDF4DF" stroke-width="1" opacity="0.16"/>
    <!-- rays -->
    <g stroke="url(#ray)" stroke-width="1.4">
      <line x1="0" y1="-200" x2="0" y2="200"/>
      <line x1="-200" y1="0" x2="200" y2="0"/>
      <line x1="-142" y1="-142" x2="142" y2="142"/>
      <line x1="142" y1="-142" x2="-142" y2="142"/>
    </g>
    <!-- four-point star -->
    <path d="M0,-150 L16,-16 L150,0 L16,16 L0,150 L-16,16 L-150,0 L-16,-16 Z" fill="#FBE6BE" opacity="0.16"/>
    <path d="M0,-112 L11,-11 L112,0 L11,11 L0,112 L-11,11 L-112,0 L-11,-11 Z" fill="none" stroke="#FFF3D6" stroke-width="1.5" opacity="0.95"/>
    <!-- core -->
    <circle r="8" fill="#FFF7E4"/>
    <circle r="15" fill="none" stroke="#FFF3D6" stroke-width="1" opacity="0.7"/>
  </g>
  <text x="280" y="452" text-anchor="middle" fill="#EAD9B8" font-family="Georgia,serif" font-style="italic" font-size="16" opacity="0.85">clarity, by design</text>
</svg>
