    <radialGradient id="inB" cx="24%" cy="34%" r="55%"><stop offset="0%" stop-color="#7A4FD0" stop-opacity="0.8"/><stop offset="100%" stop-color="#7A4FD0" stop-opacity="0"/></radialGradient>
    <radialGradient id="inC" cx="30%" cy="82%" r="58%"><stop offset="0%" stop-color="#E0894E" stop-opacity="0.85"/><stop offset="100%" stop-color="#E0894E" stop-opacity="0"/></radialGradient>
    <radialGradient id="inD" cx="80%" cy="80%" r="55%"><stop offset="0%" stop-color="#D24C86" stop-opacity="0.65"/><stop offset="100%" stop-color="#D24C86" stop-opacity="0"/></radialGradient>
    <radialGradient id="inLens" cx="44%" cy="42%" r="55%"><stop offset="0%" stop-color="#FFF7E4" stop-opacity="0.5"/><stop offset="60%" stop-color="#E7C888" stop-opacity="0.1"/><stop offset="100%" stop-color="#E7C888" stop-opacity="0"/></radialGradient>
